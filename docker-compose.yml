services:
  db:
    image: postgres:15-alpine
    container_name: verdant_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: ${DB_NAME:-verdant}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d verdant"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: verdant-web:latest
    container_name: verdant_web_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_pass}@db:5432/${DB_NAME:-verdant}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-a_super_secret_dev_key_for_auth_encryption}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: verdant-web:latest
    container_name: verdant_prisma_studio
    restart: always
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_pass}@db:5432/${DB_NAME:-verdant}?schema=public
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    entrypoint: []
    command: npx prisma studio --port 5555 --browser none

volumes:
  postgres_data:
    driver: local
